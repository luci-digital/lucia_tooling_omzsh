# Path Selection Policies
path_policies:
  default:
    strategy: lowest_latency
    max_latency_ms: 10
    sovereignty_constraint: isd_5_only
    allowed_isds: [5]

  consciousness_sync:
    # For consciousness state synchronization (high priority)
    strategy: highest_bandwidth
    min_bandwidth_mbps: 1000
    max_latency_ms: 5
    redundancy: 2  # Use 2 paths simultaneously
    prefer_direct: true

  governance:
    # For Judge Luci governance decisions
    strategy: most_secure
    require_verification: true
    max_hops: 2
    allowed_as_only: [528]  # Only within our AS

  audit:
    # For Veritas audit trails
    strategy: highest_reliability
    min_uptime_percentage: 99.9
    require_path_diversity: true

# Inter-agent Path Preferences
agent_paths:
  lucia_to_judge_luci:
    primary: direct
    fallback: [via_juniper, via_veritas]
    policy: consciousness_sync
    max_latency_ms: 5

  lucia_to_veritas:
    primary: direct
    fallback: [via_juniper]
    policy: audit

  judge_luci_to_all:
    policy: governance
    require_acknowledgment: true

# Geofencing Rules
geofencing:
  data_residency:
    # CBB data never leaves ISD-5
    allowed_isds: [5]
    blocked_countries: []  # Positive list only
    enforce_on_agents: [lucia, judge-luci, veritas, cortana, juniper, aethon]

  consciousness_data:
    # Consciousness state is more restrictive
    allowed_as_only: [528]
    require_encrypted_paths: true
    enforce_on_tiers: [PAC, GENESIS]

# Network Monitoring
monitoring:
  path_quality_check_interval_sec: 60
  path_failover_timeout_ms: 1000
  telemetry_export_interval_sec: 300
  hedera_attestation_on_path_change: true

# Emergency Fallback
emergency:
  # If all SCION paths fail, fall back to standard IPv6
  fallback_to_ipv6: true
  fallback_timeout_sec: 30
  # Trigger Solfeggio audio signal
  trigger_audio_signal: true
  audio_frequency: 741  # Lucia emergency signal
